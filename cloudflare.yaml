payload:
  # === Cloudflare 官网、后台及核心服务 ===
  - 'DOMAIN-SUFFIX,cloudflare.com'      # 官网与控制台
  - 'DOMAIN-SUFFIX,cloudflare.net'      # 静态资源
  - 'DOMAIN-SUFFIX,cloudflare.tv'
  - 'DOMAIN-SUFFIX,cloudflareaccess.com'
  - 'DOMAIN-SUFFIX,cloudflareclient.com' # WARP 相关
  - 'DOMAIN-SUFFIX,cloudflaregateway.com'
  - 'DOMAIN-SUFFIX,cloudflareportal.com'
  - 'DOMAIN-SUFFIX,cloudflarestatus.com' # 服务状态页
  - 'DOMAIN-SUFFIX,cloudflaressl.com'
  
  # === 开发者服务 (Workers, Pages) ===
  - 'DOMAIN-SUFFIX,workers.dev'         # 你的 Workers 站点
  - 'DOMAIN-SUFFIX,pages.dev'           # Pages 预览与托管
  - 'DOMAIN-SUFFIX,trycloudflare.com'   # 隧道相关
  
  # === 关键的“验证码”与“五秒盾”支持 (最重要) ===
  # 很多站点的验证码和 CDN 边缘解析依赖这些域名
  - 'DOMAIN-SUFFIX,cloudflare-dns.com'  # 1.1.1.1 域名
  - 'DOMAIN-SUFFIX,one.one.one'         # 1.1.1.1 官网
  - 'DOMAIN-SUFFIX,challenges.cloudflare.com' # Turnstile 验证码核心
  - 'DOMAIN-SUFFIX,hcaptcha.com'        # (可选) CF 常用的验证服务
  
  # === 精准 IP 段 (仅保留 DNS 相关) ===
  # 如果你想让 1.1.1.1 的请求也走这个规则，只留这几个极小的 IP
  - 'IP-CIDR,1.1.1.1/32'
  - 'IP-CIDR,1.0.0.1/32'
  - 'IP-CIDR,162.159.36.1/32' # Cloudflare 内部服务 IP
